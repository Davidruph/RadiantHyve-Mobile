name: radianthyve_unified
description: "Unified RadiantHyve app for Teachers, Parents, and Principal."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  get_storage: ^2.1.1
  flutter_keyboard_visibility: ^6.0.0
  shimmer: ^3.0.0
  intl: ^0.20.2
  awesome_snackbar_content: ^0.1.6
  share_plus: ^10.1.2
  photo_view: ^0.15.0
  permission_handler: ^11.3.1
  animate_do: ^3.3.4
  pinput: ^5.0.0
  popover: ^0.3.1
  image_picker: ^1.1.2
  device_info_plus: ^11.2.0
  intl_phone_field: ^3.2.0
  flutter_spinkit: ^5.2.1
  grouped_list: ^6.0.0
  table_calendar:
  flutter_typeahead:
  file_picker: ^8.1.2
  firebase_messaging: ^15.2.6
  firebase_core: ^3.13.1
  flutter_udid: ^4.0.0
  dio: ^5.8.0+1
  http: ^1.3.0
  internet_connection_checker: ^1.0.0+1
  another_flushbar: ^1.12.30
  connectivity_plus: ^6.1.4
  cached_network_image: ^3.4.1
  nb_utils: ^7.0.7
  geolocator:
  geocoding:
  socket_io_client: ^3.1.2
  dropdown_button2: ^2.3.9
  timeago: ^3.7.1
  flutter_local_notifications: ^19.2.1
  screenshot: ^3.0.0
  path_provider: ^2.1.2
  pdf: ^3.11.1
  path: ^1.8.3
  readmore: ^3.0.0
  flutter_cache_manager: ^3.4.1
  device_marketing_names: ^0.9.4
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Regular
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
    - family: Medium
      fonts:
        - asset: assets/fonts/Poppins-Medium.ttf
    - family: SemiBold
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
    - family: Bold
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
    - family: RoseBold
      fonts:
        - asset: assets/fonts/RedRose-Bold.ttf
